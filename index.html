<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工程管理アプリ（共有版）</title>
<style>
body{font-family:sans-serif;background:#f5f5f5;margin:0;padding:10px}
.card{background:#fff;padding:15px;border-radius:10px;margin-bottom:10px}
input,button{width:100%;margin:5px 0;padding:10px}
button{background:#2563eb;color:#fff;border:none;border-radius:5px}
</style>
</head>
<body>

<div class="card">
<h2>工程管理（共有版）</h2>
<input id="name" placeholder="工程名">
<input id="person" placeholder="担当">
<button onclick="add()">追加</button>
</div>

<div class="card">
<button onclick="load()">最新読込</button>
<button onclick="save()">共有保存</button>
</div>

<div id="list"></div>

<script>

// ★ここにURL入れる
const APPS_SCRIPT_URL = '';

// データ
let data = [];

// 追加
function add(){
  const name = document.getElementById("name").value;
  const person = document.getElementById("person").value;
  if(!name)return alert("入力して");
  data.push({name,person});
  render();
}

// 表示
function render(){
  const list = document.getElementById("list");
  list.innerHTML = data.map(d=>`
    <div class="card">
      ${d.name}<br>${d.person}
    </div>
  `).join("");
}

// 保存
async function save(){
  if(!APPS_SCRIPT_URL)return alert("URL入れて");
  await fetch(APPS_SCRIPT_URL,{
    method:"POST",
    body:JSON.stringify({projects:data})
  });
  alert("保存OK");
}

// 読込
async function load(){
  if(!APPS_SCRIPT_URL)return alert("URL入れて");
  const res = await fetch(APPS_SCRIPT_URL);
  const json = await res.json();
  data = json.projects || [];
  render();
}

</script>

</body>
</html>
